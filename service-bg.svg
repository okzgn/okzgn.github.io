  <!-- ==================== BIG CIRLE ==================== -->
  <g>
    <circle cx="600" cy="337.5" r="235" fill="none" stroke="rgba(255, 255, 255, 0.33)" stroke-width="6" opacity="0.3" filter="url(#glow)" />
