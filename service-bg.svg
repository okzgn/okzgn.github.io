<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" width="100%" height="100%">
  <defs>
    <!-- BG GRADIENT -->
    <!--<linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#c0efff" />
      <stop offset="40%" stop-color="#adceef" />
      <stop offset="100%" stop-color="#aacaeb" />
    </linearGradient>-->

    <!-- SHINE -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>

    <!-- SHINE -->
    <filter id="strongGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="4" result="blur" />
      <feComponentTransfer in="blur" result="glow">
        <feFuncA type="linear" slope="2"/>
      </feComponentTransfer>
      <feMerge>
        <feMergeNode in="glow" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>

    <!-- STAR -->
    <g id="star">
      <path d="M 0,-10 C 0,-2 2,0 10,0 C 2,0 0,2 0,10 C 0,2 -2,0 -10,0 C -2,0 0,-2 0,-10 Z" fill="#ffffff" filter="url(#strongGlow)"/>
    </g>
  </defs>

  <!-- BG -->
  <rect width="1200" height="675" fill="none" /><!--url(#bgGradient)-->

  <!-- PATTERN MESH -->
  <g stroke="rgba(255,255,255,0.05)" stroke-width="1">
